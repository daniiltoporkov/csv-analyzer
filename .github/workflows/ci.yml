name: CSV Analyzer CI

on:
  push:
    branches: [ develop, master, 'release/*', 'hotfix/*' ]
  pull_request:
    branches: [ develop, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest pytest-cov black isort
      - name: Lint with black and isort (non-blocking)
        run: |
          black --check --diff src tests || true
          isort --check-only --diff src tests || true
      - name: Unit tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml tests/
      - name: Integration tests
        run: pytest tests/integration/ -v
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/